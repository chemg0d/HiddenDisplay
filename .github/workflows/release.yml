name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Update version in source
        shell: pwsh
        run: |
          $ver = "${{ steps.tag_version.outputs.new_version }}"
          $content = Get-Content src/main_window.py -Raw
          $content = $content -replace 'APP_VERSION\s*=\s*"[^"]+"', "APP_VERSION = `"$ver`""
          $content | Set-Content src/main_window.py

      - name: Build with PyInstaller
        run: |
          pyinstaller build.spec --clean --noconfirm

      - name: Zip Release
        shell: pwsh
        run: |
          Compress-Archive -Path dist/HiddenDisplay -DestinationPath "dist/HiddenDisplay-${{ steps.tag_version.outputs.new_tag }}.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: HiddenDisplay ${{ steps.tag_version.outputs.new_tag }}
          draft: false
          prerelease: false
          files: dist/HiddenDisplay-${{ steps.tag_version.outputs.new_tag }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
