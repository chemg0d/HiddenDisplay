name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller build.spec --clean --noconfirm

      - name: Get Version
        id: get_version
        shell: pwsh
        run: |
          $content = Get-Content src/main_window.py -Raw
          if ($content -match 'APP_VERSION\s*=\s*\"([^\"]+)\"') {
              $version = $Matches[1]
              echo "VERSION=$version" >> $env:GITHUB_ENV
              echo "tag=v$version" >> $env:GITHUB_OUTPUT
          } else {
              Write-Error "Could not find APP_VERSION in src/main_window.py"
              exit 1
          }

      - name: Check if tag exists
        id: check_tag
        shell: pwsh
        run: |
          $tag_exists = git tag -l "v${{ env.VERSION }}"
          if ($tag_exists) {
            echo "exists=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "exists=false" >> $env:GITHUB_OUTPUT
          }

      - name: Create Tag
        if: steps.check_tag.outputs.exists == 'false'
        shell: pwsh
        run: |
          git tag "v${{ env.VERSION }}"
          git push origin "v${{ env.VERSION }}"

      - name: Zip Release
        if: steps.check_tag.outputs.exists == 'false'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/HiddenDisplay -DestinationPath "dist/HiddenDisplay-v${{ env.VERSION }}.zip"

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: HiddenDisplay v${{ env.VERSION }}
          draft: false
          prerelease: false
          files: dist/HiddenDisplay-v${{ env.VERSION }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
